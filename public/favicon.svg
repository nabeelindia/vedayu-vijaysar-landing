<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#5C3D1E"/>
  <!-- Wooden cup / tumbler shape -->
  <rect x="11" y="7" width="10" height="14" rx="2" fill="#C9A84C"/>
  <rect x="12" y="8" width="8" height="12" rx="1.5" fill="#E8C97A"/>
  <!-- Wood grain lines -->
  <line x1="12" y1="11" x2="20" y2="11" stroke="#C9A84C" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="12" y1="13.5" x2="20" y2="13.5" stroke="#C9A84C" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="12" y1="16" x2="20" y2="16" stroke="#C9A84C" stroke-width="0.6" stroke-linecap="round"/>
  <!-- Base of cup -->
  <rect x="10" y="21" width="12" height="2.5" rx="1.25" fill="#C9A84C"/>
  <!-- Small leaf accent -->
  <ellipse cx="23" cy="10" rx="3" ry="5" fill="#4A7C59" transform="rotate(-35 23 10)"/>
  <line x1="23" y1="13" x2="21" y2="8" stroke="#fff" stroke-width="0.5" stroke-linecap="round" opacity="0.6"/>
</svg>
